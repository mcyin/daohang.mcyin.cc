<meta charset="UTF-8">
<style>
    /*默认字体样式开始*/

    * {
        font-family: "KaiTi";
    }

    /*默认字体样式结束*/

    html {
        height: 100%;
    }

    /*默认背景样式开始*/

    .my-body {
        width: 100%;
        height: 100%;
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-image: url(../image/background/default.jpg);
    }

    /*默认背景样式结束*/

    /*导航栏样式开始*/

    .my-nav {
        background-color: rgba(86, 87, 136, 0.7);
        padding-top: 0rem;
        padding-bottom: 0rem;
    }

    /*导航栏样式结束*/

    /*LOGO样式开始*/

    .my-nav-logo {
        padding-left: 2.5rem;
        background-size: contain;
        background-repeat: no-repeat;
        background-image: url(../image/logo/mcyin.png)
    }

    /*LOGO样式结束*/

    /*导航栏链接样式开始*/

    .my-header-nav-item a {
        text-align: center;
    }

    .my-header-nav-item a:hover {
        background: rgba(104, 106, 204, 0.5);
    }

    .active.my-header-nav-item {
        background: rgba(104, 106, 204, 0.5);
    }

    /*导航栏链接样式结束*/

    /*导航栏天气样式开始*/

    .nav-weather {
        width: 180px;
        height: 36px;
        margin: 2px 1rem;
    }

    @media(max-width:992px) {
        .nav-weather {
            width: 100%;
        }
    }

    /*导航栏天气样式开始*/

    /*导航栏搜索输入框样式开始*/

    .search-text,
    .search-text:active,
    .search-text:focus {
        color: white;
        text-align: center;
        width: calc(100% - 42px);
        background: rgba(104, 106, 204, 0.5);
        border-color: #686acc;
    }

    .search-text::placeholder {
        color: white;
    }

    .form-inline .search-text {
        width: calc(100% - 42px);
    }

    /*导航栏搜索输入框样式结束*/

    /*导航栏搜索按钮样式开始*/

    .search-button {
        color: white;
        background-color: rgba(104, 106, 204, 0.5);
        background-image: none;
        border-color: #686acc;
    }

    /*导航栏搜索按钮样式结束*/

    /*页脚样式开始*/

    .my-footer {
        color: white;
        word-break: keep-all;
        background-color: #352d41;
        padding-top: 1rem;
        padding-bottom: 1rem;
    }

    .my-footer a,
    .my-footer a:hover {
        color: white;
        text-decoration: none;
    }

    /*页脚样式结束*/
</style>
