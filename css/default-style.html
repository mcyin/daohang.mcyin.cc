<meta charset="UTF-8">
<style>
    /*默认字体样式开始*/

    * {
        font-family: "KaiTi";
    }

    /*默认字体样式结束*/

    html {
        height: 100%;
    }

    /*默认背景样式开始*/

    .my-body {
        width: 100%;
        height: 100%;
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-image: url(../image/default-background.png)
    }

    /*默认背景样式结束*/

    /*导航栏样式开始*/

    .my-nav {
        background-color: rgba(86, 87, 136, 0.7);
        padding-top: 0rem;
        padding-bottom: 0rem;
    }

    /*导航栏样式结束*/

    /*LOGO样式开始*/

    .my-nav-logo {
        padding-left: 2.5rem;
        background-size: contain;
        background-repeat: no-repeat;
        background-image: url(../image/logo.png)
    }

    /*LOGO样式结束*/

    /*导航栏链接样式开始*/

    .nav-item a {
        text-align: center;
    }

    .nav-item a:hover {
        background: #686acc;
    }

    .active.nav-item {
        background: #686acc;
    }

    /*导航栏链接样式结束*/

    /*导航栏百度搜索输入框样式开始*/

    .baidu-submit-text,
    .baidu-submit-text:active,
    .baidu-submit-text:focus {
        color: white;
        text-align: center;
        background: #686acc;
    }

    .baidu-submit-text::placeholder {
        color: white;
    }

    /*导航栏百度搜索输入框样式结束*/

    /*导航栏百度搜索按钮样式开始*/

    .baidu-submit-button {
        color: white;
        background-color: #686acc;
        background-image: none;
        border-color: #686acc;
    }

    /*导航栏百度搜索按钮样式结束*/

    /*页脚样式开始*/

    .my-footer {
        color: white;
        word-break: keep-all;
        background-color: #352d41;
        padding-top: 1rem;
        padding-bottom: 1rem;
    }

    .my-footer a,
    .my-footer a:hover {
        color: white;
        text-decoration: none;
    }

    /*页脚样式结束*/
</style>
