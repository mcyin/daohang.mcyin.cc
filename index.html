<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!--前端框架css文件开始-->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.1.0/css/all.css">
    <!--前端框架css文件结束-->
    <!--自定义css文件开始-->
    <link rel="stylesheet" href="css/default-style.min.css">
    <link rel="stylesheet" href="css/main-style.min.css">

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>小殷网址导航 - 纯净无广告的常用网址导航。</title>

</head>

<body class="my-body">
    <!--页眉开始-->
    <header>
        <nav class="navbar fixed-top navbar-expand-lg navbar-dark my-nav">
            <div class="container">
                <!--LOGO开始-->
                <a class="navbar-brand" href="#" style="padding-left: 1rem; padding-right: 1rem; margin: auto;">
                    <div class="my-nav-logo">
                        小殷网址导航
                    </div>
                </a>
                <!--LOGO结束-->
                <!--导航栏链接开始-->
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mr-auto">
                        <li class="nav-item active">
                            <a class="nav-link" href="#">网址导航

                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="https://www.mcyin.cc">个人主页</a>
                        </li>
                    </ul>
                    <!--导航栏链接结束-->
                    <!--导航栏百度搜索开始-->
                    <form class="form-inline my-2 my-lg-0" action="https://www.baidu.com/baidu" target="_blank">
                        <input class="form-control mr-sm-2 baidu-submit-text" type="text" name="word" baiduSug="1" placeholder="百度一下" aria-label="百度一下">
                        <button class="btn my-2 my-sm-0 baidu-submit-button" type="submit">
                            <i class="fas fa-search"></i>
                        </button>
                    </form>
                    <!--导航栏百度搜索结束-->
                </div>
            </div>
        </nav>
    </header>
    <!--页眉结束-->
    <!--内容开始-->
    <main class="my-main">
        <div class="my-main-div" id="home">

        </div>
        <div class="my-main-div" id="1" style="background-color: rgba(255, 0, 0, 0.5)">

        </div>

        </div>

    <!--内容结束-->
    <!--页脚开始-->

            <center>
                <span>©</span>

    <!--前端框架js文件结束-->
