<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!--前端框架css文件开始-->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css">
    <!--前端框架css文件结束-->
    <!--自定义css文件开始-->
    <link rel="stylesheet" href="./css/default-style.min.css">
    <link rel="stylesheet" href="./css/main-style.min.css">
    <!--自定义css文件结束-->
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <title>小殷网址导航 - 纯净无广告的常用网址导航。</title>
    <meta name="keywords" content="小殷网址导航">
    <meta name="description" content="小殷网址导航 - 纯净无广告的常用网址导航。">
</head>

<body class="my-body">
    <!--页眉开始-->
    <header>
        <nav class="navbar fixed-top navbar-expand-lg navbar-dark my-nav">
            <div class="container">
                <!--LOGO开始-->
                <a class="navbar-brand" href="" style="padding-left: 1rem; padding-right: 1rem; margin: auto;">
                    <div class="my-nav-logo">
                        小殷网址导航
                    </div>
                </a>
                <!--LOGO结束-->
                <button class="navbar-toggler" type="button" data-toggle="collapse"
                    data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <div style="margin: auto;">
                        <!--导航栏链接开始-->
                        <ul class="navbar-nav mr-auto">
                            <li class="my-header-nav-item">
                                <a class="nav-link" href="http://www.mcyin.cc" target="_blank"
                                    style="color: white;">小殷网站</a>
                            </li>
                            <li class="my-header-nav-item">
                                <a class="nav-link" href="https://i.youku.com/i/UMTc2MTA1MjM2" target="_blank"
                                    style="color: white;">小殷优酷</a>
                            </li>
                            <li class="my-header-nav-item">
                                <a class="nav-link" href="https://space.bilibili.com/14167612" target="_blank"
                                    style="color: white;">小殷bilibili</a>
                            </li>
                        </ul>
                        <!--导航栏链接结束-->
                    </div>
                    <!--导航栏天气开始-->
                    <center class="nav-weather">
                        <iframe allowtransparency="true" frameborder="0" width="100%" height="100%" scrolling="no"
                            src="https://tianqi.2345.com/plugin/widget/index.htm?s=3&z=2&t=1&v=0&d=1&bd=0&k=000000&f=ffffff&ltf=00ff00&htf=ff0000&q=1&e=0&a=1&c=54511&w=180&h=36&align=center"></iframe>
                    </center>
                    <!--导航栏天气结束-->
                    <!--导航栏搜索开始-->
                    <form class="form-inline" action="https://www.baidu.com/baidu" target="_blank">
                        <input class="form-control search-text" type="text" name="word" placeholder="百度搜索"
                            aria-label="百度搜索">
                        <button class="btn search-button" type="submit">
                            <i class="fas fa-search"></i>
                        </button>
                    </form>
                    <!--导航栏搜索结束-->
                    <div style="margin: 1rem 0;"></div>
                </div>
            </div>
        </nav>
    </header>
    <!--页眉结束-->
    <!--内容开始-->
    <main class="my-main">
        <!--首屏开始-->
        <div class="my-main-div" id="home">
            <!--首屏搜索开始-->
            <div class="container" id="home-search">
                <div class="tab-content" id="search-tab-content">
                    <div class="tab-pane fade show active" id="baidu-search" role="tabpanel"
                        aria-labelledby="search-home-tab">
                        <div class="container">
                            <div class="row">
                                <div class="col-6 col-md-3" style="margin: auto;">
                                    <center>
                                        <a href="https://www.baidu.com" target="_blank">
                                            <div class="search-logo search-baidu-logo"></div>
                                        </a>
                                    </center>
                                </div>
                                <div class="col-md-9 home-search-form">
                                    <form class="form-inline" action="https://www.baidu.com/s" target="_blank">
                                        <input class="form-control search-text" type="text" name="word"
                                            placeholder="百度搜索" aria-label="百度搜索">
                                        <button class="btn search-button" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="sogou-search" role="tabpanel" aria-labelledby="profile-tab">
                        <div class="container">
                            <div class="row">
                                <div class="col-6 col-md-3" style="margin: auto;">
                                    <center>
                                        <a href="https://www.sogou.com" target="_blank">
                                            <div class="search-logo search-sogou-logo"></div>
                                        </a>
                                    </center>
                                </div>
                                <div class="col-md-9 home-search-form">
                                    <form class="form-inline" action="https://www.sogou.com/web" target="_blank">
                                        <input class="form-control search-text" type="text" name="query"
                                            placeholder="搜狗搜索" aria-label="搜狗搜索">
                                        <button class="btn search-button" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="so-search" role="tabpanel" aria-labelledby="contact-tab">
                        <div class="container">
                            <div class="row">
                                <div class="col-6 col-md-3" style="margin: auto;">
                                    <center>
                                        <a href="https://www.so.com" target="_blank">
                                            <div class="search-logo search-360-logo"></div>
                                        </a>
                                    </center>
                                </div>
                                <div class="col-md-9 home-search-form">
                                    <form class="form-inline" action="https://www.so.com/s" target="_blank">
                                        <input class="form-control search-text" type="text" name="q" placeholder="360搜索"
                                            aria-label="360搜索">
                                        <button class="btn search-button" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="bing-search" role="tabpanel" aria-labelledby="contact-tab">
                        <div class="container">
                            <div class="row">
                                <div class="col-6 col-md-3" style="margin: auto;">
                                    <center>
                                        <a href="https://www.bing.com" target="_blank">
                                            <div class="search-logo search-bing-logo"></div>
                                        </a>
                                    </center>
                                </div>
                                <div class="col-md-9 home-search-form">
                                    <form class="form-inline" action="https://www.bing.com/search" target="_blank">
                                        <input class="form-control search-text" type="text" name="q"
                                            placeholder="Bing搜索" aria-label="Bing搜索">
                                        <button class="btn search-button" type="submit">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <ul class="nav search-tabs justify-content-center" id="search-tab" role="tablist">
                    <li class="nav-item">
                        <a class="nav-link active search-logo-min search-baidu-logo" id="baidu-search-tab"
                            data-toggle="tab" href="#baidu-search" role="tab" aria-controls="百度搜索"
                            aria-selected="true"></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link search-logo-min search-sogou-logo" id="sogou-search-tab" data-toggle="tab"
                            href="#sogou-search" role="tab" aria-controls="搜狗搜索" aria-selected="false"></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link search-logo-min search-360-logo" id="360-search-tab" data-toggle="tab"
                            href="#so-search" role="tab" aria-controls="360搜索" aria-selected="false"></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link search-logo-min search-bing-logo" id="bing-search-tab" data-toggle="tab"
                            href="#bing-search" role="tab" aria-controls="Bing搜索" aria-selected="false"></a>
                    </li>
                </ul>
            </div>
            <!--首屏搜索结束-->
        </div>
        <!--首屏结束-->
        <!--
        <div class="my-main-div" id="1" style="background-color: rgba(255, 0, 0, 0.5)">

        </div>
        <div class="my-main-div" id="2" style="background-color: rgba(0, 255, 0, 0.5)">

        </div>
        <div class="my-main-div" id="3" style="background-color: rgba(0, 0, 255, 0.5)">

        </div>
        -->
    </main>
    <!--内容结束-->
    <!--页脚开始-->
    <footer class="footer fixed-bottom my-footer">
        <div class="container">
            <center>
                <span>©</span>
                <span>
                    <script type="text/javascript">
                        var d = new Date()
                        document.write(d.getFullYear())
                    </script>
                </span>
                <span>
                    <a href="http://www.mcyin.cc" target="_blank">mcyin.cc</a>
                </span>
                <span>
                    <a href="">小殷网址导航</a>
                </span>
            </center>
        </div>
    </footer>
    <!--页脚结束-->
    <!--前端框架js文件开始-->
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <!--前端框架js文件结束-->
</body>

</html>
